[project]
name = "tipjar"
description = "Decentralized tipping platform on Stacks"
authors = []
telemetry = true
cache_dir = "./.cache"
requirements = []

[contracts.tipjar]
path = "contracts/tipjar.clar"
clarity_version = 4
epoch = "3.3"

[contracts.tip-token]
path = "contracts/tip-token.clar"
clarity_version = 4
epoch = "3.3"

[contracts.tip-registry]
path = "contracts/tip-registry.clar"
clarity_version = 4
epoch = "3.3"

[repl]
clarity_wasm_mode = false
show_timings = false

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
